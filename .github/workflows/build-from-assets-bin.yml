name: Build executables from assets .bin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout assets branch
        uses: actions/checkout@v4
        with:
          ref: assets
          path: assets-branch
          lfs: true

      - name: Copy .bin assets (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cp -f assets-branch/*.bin .
          ls -lah *.bin

      - name: Copy .bin assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem assets-branch -Filter *.bin | ForEach-Object {
            Copy-Item $_.FullName -Destination . -Force
          }
          Get-ChildItem *.bin

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcurl4-openssl-dev

      - name: Install Windows build dependencies (MSYS2)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-curl

      - name: Build on Linux/macOS
        if: runner.os != 'Windows'
        run: make

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make

      - name: Prepare artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp -f pedantixsolver dist/pedantixsolver-linux
          chmod +x dist/pedantixsolver-linux

      - name: Prepare artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp -f pedantixsolver dist/pedantixsolver-macos-latest
          chmod +x dist/pedantixsolver-macos-latest

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item pedantixsolver.exe -Destination "dist/pedantixsolver-windows-latest.exe" -Force

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: pedantixsolver-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  release-draft:
    name: Create draft release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pedantixsolver-*
          merge-multiple: true
          path: dist

      - name: Verify all OS artifacts are present
        run: |
          test -f dist/pedantixsolver-linux
          test -f dist/pedantixsolver-macos-latest
          test -f dist/pedantixsolver-windows-latest.exe
          ls -lah dist

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
